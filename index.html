<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Private League - Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1a3a5f; --secondary: #2b6cb0; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--primary); }
        .setup-bar { background: #1a3a5f; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; background: #4a5568; }
        .tabs { display: flex; background: #e9ecef; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; color: #495057; transition: 0.3s; background: none; }
        .tab-btn.active { color: var(--primary); background: white; border-bottom: 4px solid var(--primary); }
        .content-section { padding: 25px; display: none; }
        .content-section.active { display: block; }
        
        /* Rank Grid Layout */
        .rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 20px 0; }
        .rank-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border-top: 4px solid var(--secondary); }
        .rank-card h4 { margin: 0 0 10px 0; font-size: 0.95em; color: var(--primary); }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.8em; padding: 4px 0; border-bottom: 1px solid #f8f9fa; }
        .rank-count { font-weight: bold; color: var(--success); background: #f0fdf4; padding: 1px 6px; border-radius: 4px; }

        /* Existing Podium & Bars */
        .podium-container { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 15px; margin-bottom: 30px; }
        .podium-box { flex: 1; min-width: 300px; text-align: center; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 8px; height: 160px; margin-top: 10px; }
        .podium-place { width: 95px; text-align: center; color: white; border-radius: 8px 8px 0 0; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 10px; font-weight: bold; }
        .place-1 { background: var(--gold); height: 130px; }
        .place-2 { background: var(--silver); height: 100px; }
        .place-3 { background: var(--bronze); height: 75px; }
        
        .race-bar-bg { background: #e2e8f0; height: 6px; border-radius: 3px; overflow: hidden; margin: 6px 0; width: 100%; max-width: 150px; }
        .race-bar-fill { background: var(--success); height: 100%; transition: width 0.5s; }
        .goal-status { font-size: 0.7em; font-weight: bold; color: #666; }

        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .dash-card { padding: 15px; border-radius: 8px; color: white; text-align: center; }
        .dash-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85rem; }
        th { background: var(--primary); color: white; padding: 10px; }
        td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .amt-tag { display: block; font-size: 0.8em; color: #166534; font-weight: bold; background: #dcfce7; border-radius: 4px; padding: 2px 4px; margin-top: 2px;}
        .sim-btn { flex: 1; min-width: 65px; padding: 12px 5px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="setup-bar">
    <div>🌐 <span id="cloudStatus" class="status-pill">CONNECTING...</span></div>
    <div onclick="adminLogin()" style="cursor:pointer;">🔒 <small id="adminText">Member View (Tap to Edit)</small></div>
</div>

<div id="liveBanner" style="background: #fffbeb; border-bottom: 3px solid var(--gold); padding: 12px; display: none; text-align: center; font-size: 0.9em;">
    <div id="bannerContent"></div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'rules')">📜 The Playbook</button>
        <button class="tab-btn" onclick="openTab(event, 'tracker')">🏏 Tracker</button>
        <button class="tab-btn" onclick="openTab(event, 'summary')">💰 Payouts</button>
        <button class="tab-btn" onclick="openTab(event, 'scheduleTab')">📅 Schedule</button>
    </div>

    <div id="rules" class="content-section active">
        <h1 style="text-align:center; color:var(--primary); margin-bottom:5px;">🏆 Official Playbook</h1>
        
        <div style="margin-bottom: 25px; text-align: center;">
            <div style="font-size: 0.75em; color: #666; margin-bottom: 5px;">TOURNAMENT PROGRESS: <span id="tourneyCount">0</span>/74 MATCHES</div>
            <div style="background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; width: 80%; margin: auto;">
                <div id="tourneyBar" style="background: var(--secondary); height: 100%; width: 0%; transition: width 1s;"></div>
            </div>
        </div>

        <h3 style="color:var(--primary); font-size:1.1em; border-left: 4px solid var(--gold); padding-left:10px; margin-bottom:15px;">🏅 Rank Leaderboard</h3>
        <div class="rank-grid" id="rankLeaderboard">
            </div>

        <div style="background: linear-gradient(135deg, #1a3a5f, #2b6cb0); color: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
            <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">🔮 Hall of Fame Finder</h3>
            <p style="font-size: 0.8em; opacity: 0.9;">Click a rank to see who hit it and when:</p>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
                <button onclick="simulatePrize(0)" class="sim-btn" style="background:var(--gold); color:#000;">🥇 1st</button>
                <button onclick="simulatePrize(1)" class="sim-btn" style="background:var(--silver); color:#000;">🥈 2nd</button>
                <button onclick="simulatePrize(2)" class="sim-btn" style="background:var(--bronze);">🥉 3rd</button>
                <button onclick="simulatePrize(3)" class="sim-btn" style="background:#4a5568;">🏅 4th</button>
                <button onclick="simulatePrize(4)" class="sim-btn" style="background:#718096;">🏅 5th</button>
            </div>
            <div id="simResult" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; display:none; border: 1px dashed rgba(255,255,255,0.3);">
                <div id="simPrize" style="font-size: 1.1em; font-weight: bold; color: var(--gold); text-align: center; margin-bottom: 10px;"></div>
                <div id="simWinners" style="font-size: 0.85em; line-height: 1.4; max-height:150px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="tracker" class="content-section">...</div>
    <div id="summary" class="content-section">...</div>
    <div id="scheduleTab" class="content-section">...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCX2R1cJ1O6KWEqP-WQVrSOcRiUnh7L4OE",
        authDomain: "ipl-2026-family-league.firebaseapp.com",
        databaseURL: "https://ipl-2026-family-league-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ipl-2026-family-league",
        storageBucket: "ipl-2026-family-league.firebasestorage.app",
        messagingSenderId: "79118001977",
        appId: "1:79118001977:web:a849b1c79fa6468b11eae8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const PRIZES = [110, 80, 50, 35, 25]; 
    const ALL_PLAYERS = ["Abha","Aju", "Anil", "Anju", "Ashu", "Atul", "Devansh", "Divya", "Dolly", "Khusboo", "Neeraj", "Nirvi", "Sonu", "Suksham", "Sweety"];
    const DEPOSIT_GOAL = 1480;

    // ... (Keep IPL_DATA from previous turn) ...

    let winnersList = {};
    let paidHistory = [];
    let isAdmin = false;

    function renderTables() {
        const hBody = document.getElementById('historyBody');
        const sBody = document.getElementById('summaryBody');
        const rankBoard = document.getElementById('rankLeaderboard');
        
        let currentStats = {};
        let rankCounts = [{}, {}, {}, {}, {}]; // Frequency of each rank per player

        const sortedMatchKeys = Object.keys(winnersList).sort((a,b) => a.split('_')[1] - b.split('_')[1]);
        const completedCount = sortedMatchKeys.length;
        
        document.getElementById('tourneyCount').innerText = completedCount;
        document.getElementById('tourneyBar').style.width = (completedCount / 74 * 100) + '%';

        sortedMatchKeys.forEach(key => {
            const winners = winnersList[key].winners;
            winners.forEach((boxValue, idx) => {
                if(boxValue) {
                    const shared = boxValue.split(', ').filter(n => n);
                    shared.forEach(p => {
                        rankCounts[idx][p] = (rankCounts[idx][p] || 0) + 1;
                    });
                }
            });
        });

        // DISPLAY RANK FREQUENCY CARDS
        const rankNames = ["🥇 1st", "🥈 2nd", "🥉 3rd", "🏅 4th", "🏅 5th"];
        rankBoard.innerHTML = rankNames.map((label, idx) => {
            const sortedPlayers = Object.entries(rankCounts[idx]).sort((a,b) => b[1] - a[1]);
            return `
                <div class="rank-card">
                    <h4>${label}</h4>
                    <div>
                        ${sortedPlayers.map(e => `
                            <div class="rank-item">
                                <span>${e[0]}</span>
                                <span class="rank-count">${e[1]}x</span>
                            </div>
                        `).join('') || '<small>No records</small>'}
                    </div>
                </div>`;
        }).join('');

        document.getElementById('cloudStatus').innerText = "LIVE ✅";
        // ... (Keep existing Payout/Tracker table rendering logic) ...
    }

    function simulatePrize(rankIndex) {
        const ranks = ["1st", "2nd", "3rd", "4th", "5th"];
        const resBox = document.getElementById('simResult');
        const winnersEl = document.getElementById('simWinners');
        resBox.style.display = 'block';
        document.getElementById('simPrize').innerText = `${ranks[rankIndex]} Prize: ₹${PRIZES[rankIndex]}`;
        
        let list = [];
        Object.keys(winnersList).forEach(k => {
            const m = k.split('_')[1];
            if(winnersList[k].winners[rankIndex]) list.push(`<b>M${m}</b>: ${winnersList[k].winners[rankIndex]}`);
        });
        winnersEl.innerHTML = list.length > 0 ? list.join(' | ') : "No winners yet!";
    }

    // ... (Keep adminLogin, saveCurrentMatch, fetchAllData as before) ...

    window.onload = () => { fetchAllData(); };
</script>
</body>
</html>
