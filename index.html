<div id="summary" class="content-section">
    <div class="dash-grid">
        <div class="dash-card" style="background:var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <small>Entry Fee Goal</small>
            <p>₹1,480</p>
        </div>
        <div class="dash-card" style="background:var(--success); box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <small>Total Won (League)</small>
            <p id="dashTotalWon">₹0</p>
        </div>
        <div class="dash-card" style="background:var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <small>Total Settled</small>
            <p id="dashPaid">₹0</p>
        </div>
    </div>

    <div class="podium-container" style="padding-bottom: 20px;">
        <div class="podium-box">
            <h3 style="color:var(--primary); margin-bottom:15px; font-size:1.1em;">🏆 Top Earners (Total Winnings)</h3>
            <div class="podium" id="topPodium" style="min-height: 180px;"></div>
        </div>
    </div>

    <div style="background:white; border-radius:15px; border:1px solid #e2e8f0; overflow:hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);">
        <div style="padding:15px; background:#f8f9fa; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; font-size:1em; color:var(--primary);">💳 Member Recovery & Payments</h3>
            <div style="display:flex; gap:8px;">
                <button id="waBtn" class="btn" style="background:#25D366; display:none; padding:6px 12px; font-size:0.75em;" onclick="generateWhatsAppReport()">📱 Report</button>
                <label style="font-size:0.75em; color:#666;"><input type="checkbox" id="hideSettled" onchange="renderTables()"> Hide Paid</label>
            </div>
        </div>
        
        <div style="overflow-x:auto;">
            <table style="margin:0; width:100%; border:none;">
                <thead>
                    <tr style="background:#fff;">
                        <th style="text-align:left; padding:12px;">Member</th>
                        <th>Recovery Status</th>
                        <th>Total Won</th>
                        <th>Due (Neeraj to Pay)</th>
                        <th>Settle</th>
                    </tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
        <div style="padding:15px;">
            <button class="btn" style="background:var(--success); width:100%; height:50px; font-size:1.1em; border-radius:10px;" id="settleBtn" onclick="processSettlement()" disabled>✅ Confirm Settlement</button>
        </div>
    </div>
</div>
