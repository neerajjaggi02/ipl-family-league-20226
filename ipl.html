<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Private League - Official</title>
    
    <meta property="og:title" content="IPL 2026 Family League">
    <meta property="og:description" content="Live scores, payouts, and standings for our family league.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1531415074968-036ba1b575da?w=800">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #1a3a5f; --secondary: #2b6cb0; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 10px; line-height: 1.5; }
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--primary); }
        
        .setup-bar { background: #1a3a5f; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; background: #4a5568; }
        
        .tabs { display: flex; background: #e9ecef; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 90px; padding: 15px; border: none; cursor: pointer; font-weight: bold; color: #495057; background: none; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); background: white; border-bottom: 4px solid var(--primary); }
        
        .content-section { padding: 20px; display: none; }
        .content-section.active { display: block; }
        
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .dash-card { padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .dash-card h6 { margin: 0; font-size: 0.75rem; text-transform: uppercase; opacity: 0.9; }
        .dash-card p { margin: 8px 0 0; font-size: 1.5em; font-weight: bold; }

        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #e2e8f0; font-size: 1rem; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: #f8f9fa; padding: 12px; border-bottom: 2px solid #edf2f7; }
        td { border-bottom: 1px solid #f1f5f9; padding: 12px; text-align: center; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; transition: 0.2s; }
        .amt-tag { font-size: 0.8em; color: #166534; font-weight: bold; background: #dcfce7; border-radius: 4px; padding: 2px 4px; display: inline-block; }
        
        #adminEntry select { margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="setup-bar">
    <div>🌐 <span id="cloudStatus" class="status-pill">CONNECTING...</span></div>
    <div onclick="adminLogin()" style="cursor:pointer;">🔒 <small id="adminText">Member View</small></div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'rules')">🏆 Standings</button>
        <button class="tab-btn" onclick="openTab(event, 'tracker')">🏏 History</button>
        <button class="tab-btn" onclick="openTab(event, 'summary')">💰 Payouts</button>
        <button class="tab-btn" onclick="openTab(event, 'analytics')">📊 Trends</button>
    </div>

    <div id="rules" class="content-section active">
        <h2 style="text-align:center;">Leaderboard</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="generateWhatsAppReport()" style="background: #25D366; border-radius: 30px;" class="btn">📱 Share Report</button>
        </div>
        <div class="rank-grid" id="rankLeaderboard" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;"></div>
    </div>

    <div id="tracker" class="content-section">
        <div id="adminEntry" style="display:none; background:#f0f4f8; padding:15px; border-radius:8px; margin-bottom:20px;">
            <h4 style="margin-top:0">Add Match Result</h4>
            <select id="matchSelect" class="search-box"></select>
            <div style="display:flex; gap:5px; overflow-x:auto;">
                <div style="min-width:80px;"><small>1st</small><select id="p1" multiple style="height:100px; width:100%"></select></div>
                <div style="min-width:80px;"><small>2nd</small><select id="p2" multiple style="height:100px; width:100%"></select></div>
                <div style="min-width:80px;"><small>3rd</small><select id="p3" multiple style="height:100px; width:100%"></select></div>
                <div style="min-width:80px;"><small>4th</small><select id="p4" multiple style="height:100px; width:100%"></select></div>
                <div style="min-width:80px;"><small>5th</small><select id="p5" multiple style="height:100px; width:100%"></select></div>
            </div>
            <button class="btn" style="background:var(--success)" onclick="saveCurrentMatch()">Save Result</button>
        </div>
        <table id="historyTable">
            <thead><tr><th>M#</th><th>1st</th><th>2nd</th><th>3rd</th><th>4th</th><th>5th</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <div id="summary" class="content-section">
        <div class="dash-grid">
            <div class="dash-card" style="background:var(--primary);"><h6>Settled</h6><p id="dashPaid">₹0</p></div>
            <div class="dash-card" style="background:var(--danger);"><h6>Pending</h6><p id="dashPending">₹0</p></div>
        </div>
        <input type="text" id="memberSearch" class="search-box" placeholder="🔍 Search member name..." onkeyup="filterTable()">
        <table id="payoutTable">
            <thead><tr><th style="text-align:left">Name</th><th>Won</th><th>Due</th><th>Action</th></tr></thead>
            <tbody id="summaryBody"></tbody>
        </table>
        <button class="btn" id="settleBtn" style="background:var(--success); display:none;" onclick="processSettlement()">Confirm Payments</button>
    </div>

    <div id="analytics" class="content-section">
        <canvas id="winningsChart" style="width:100%; height:350px;"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCX2R1cJ1O6KWEqP-WQVrSOcRiUnh7L4OE",
        authDomain: "ipl-2026-family-league.firebaseapp.com",
        databaseURL: "https://ipl-2026-family-league-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ipl-2026-family-league",
        storageBucket: "ipl-2026-family-league.firebasestorage.app",
        messagingSenderId: "79118001977",
        appId: "1:79118001977:web:a849b1c79fa6468b11eae8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const PRIZES = [110, 80, 50, 35, 25];
    const ALL_PLAYERS = ["Abha","Aju", "Anil", "Anju", "Ashu", "Atul", "Devansh", "Divya", "Dolly", "Khusboo", "Neeraj", "Nirvi", "Sonu", "Suksham", "Sweety"].sort();

    let winnersList = {};
    let paidHistory = [];
    let isAdmin = false;
    let myChart = null;

    function openTab(e, tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        e.currentTarget.classList.add('active');
        if(tabId === 'analytics') updateChart();
    }

    function adminLogin() {
        if(prompt("Admin PIN:") === "2026") {
            isAdmin = true;
            document.getElementById('adminText').innerText = "🔓 Admin Mode";
            document.getElementById('adminEntry').style.display = "block";
            document.getElementById('settleBtn').style.display = "block";
            renderAll();
        }
    }

    function saveCurrentMatch() {
        const mNum = document.getElementById('matchSelect').value;
        const winners = [];
        for(let i=1; i<=5; i++) {
            const val = Array.from(document.getElementById('p'+i).selectedOptions).map(o => o.value).join(', ');
            winners.push(val || "");
        }
        db.ref('leagueRecords/match_' + mNum).set({ winners, isAbandoned: false });
    }

    function filterTable() {
        let input = document.getElementById("memberSearch").value.toLowerCase();
        let rows = document.getElementById("summaryBody").getElementsByTagName("tr");
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    function renderAll() {
        const hBody = document.getElementById('historyBody');
        const sBody = document.getElementById('summaryBody');
        const rBoard = document.getElementById('rankLeaderboard');
        hBody.innerHTML = ''; sBody.innerHTML = ''; rBoard.innerHTML = '';

        let stats = {};
        let rankStats = [{}, {}, {}, {}, {}];
        
        Object.keys(winnersList).sort((a,b) => a.split('_')[1] - b.split('_')[1]).forEach(key => {
            const mData = winnersList[key];
            const mNum = key.split('_')[1];
            let row = `<td><b>M${mNum}</b></td>`;
            
            mData.winners.forEach((box, i) => {
                if(box) {
                    const names = box.split(', ');
                    const split = Math.round(PRIZES[i]/names.length);
                    names.forEach(n => {
                        stats[n] = (stats[n] || 0) + split;
                        rankStats[i][n] = (rankStats[i][n] || 0) + 1;
                    });
                    row += `<td>${box}<br><span class="amt-tag">₹${split}</span></td>`;
                } else row += `<td>-</td>`;
            });
            hBody.innerHTML += `<tr>${row}</tr>`;
        });

        // Rank Board
        const medals = ["🥇 1st", "🥈 2nd", "🥉 3rd", "🏅 4th", "🏅 5th"];
        rBoard.innerHTML = medals.map((m, i) => {
            const top = Object.entries(rankStats[i]).sort((a,b) => b[1]-a[1])[0];
            return `<div style="background:#fff; border:1px solid #ddd; padding:10px; border-radius:8px;">
                <small>${m}</small><br><strong>${top ? top[0] : '-'}</strong><br><small>${top ? top[1]+' wins' : ''}</small>
            </div>`;
        }).join('');

        // Payouts
        const paidMap = {};
        paidHistory.forEach(p => paidMap[p.name] = (paidMap[p.name] || 0) + p.amount);

        let totalPending = 0;
        ALL_PLAYERS.forEach(name => {
            const won = stats[name] || 0;
            const paid = paidMap[name] || 0;
            const due = won - paid;
            totalPending += due;
            sBody.innerHTML += `<tr>
                <td style="text-align:left"><b>${name}</b></td>
                <td>₹${won}</td>
                <td style="color:${due > 0 ? 'red' : 'green'}">₹${due}</td>
                <td>${due > 0 ? `<input type="checkbox" class="pay-check" data-name="${name}" data-amount="${due}" ${isAdmin ? '' : 'disabled'}>` : '✅'}</td>
            </tr>`;
        });

        document.getElementById('dashPaid').innerText = `₹${paidHistory.reduce((a,b)=>a+b.amount,0)}`;
        document.getElementById('dashPending').innerText = `₹${totalPending}`;
        updateDropdown();
    }

    function processSettlement() {
        const checks = document.querySelectorAll('.pay-check:checked');
        checks.forEach(c => paidHistory.push({ name: c.dataset.name, amount: parseInt(c.dataset.amount), date: new Date().toLocaleDateString() }));
        db.ref('leagueMaster').update({ paidHistory });
    }

    function updateDropdown() {
        const sel = document.getElementById('matchSelect');
        sel.innerHTML = "";
        for(let i=1; i<=74; i++) {
            if(!winnersList['match_'+i]) {
                const opt = document.createElement('option');
                opt.value = i; opt.text = "Match " + i;
                sel.add(opt);
            }
        }
    }

    function updateChart() {
        const ctx = document.getElementById('winningsChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        const sortedMatches = Object.keys(winnersList).sort((a,b) => a.split('_')[1] - b.split('_')[1]);
        const labels = ["Start", ...sortedMatches.map(k => "M"+k.split('_')[1])];
        
        let datasets = [];
        const top5 = ALL_PLAYERS.sort((a,b) => (winnersList[a]||0) - (winnersList[b]||0)).slice(0,5);

        top5.forEach((p, idx) => {
            let data = [0];
            let total = 0;
            sortedMatches.forEach(m => {
                winnersList[m].winners.forEach((box, i) => {
                    if(box && box.includes(p)) total += Math.round(PRIZES[i]/box.split(', ').length);
                });
                data.push(total);
            });
            datasets.push({ label: p, data, borderColor: ['#fbbf24', '#2b6cb0', '#28a745', '#dc3545', '#1a3a5f'][idx], fill: false });
        });

        myChart = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false } });
    }

    function generateWhatsAppReport() {
        const settled = paidHistory.reduce((a,b)=>a+b.amount,0);
        let text = `🏏 *IPL 2026 LEAGUE UPDATE* 🏏\n━━━━━━━━━━━━━━━━━━\n✅ Settled: *₹${settled}*\n⏳ Pending: *₹${document.getElementById('dashPending').innerText}*\n\n📈 *TOP 3 EARNERS:*\n`;
        // Quick extraction for report
        const rows = [...document.getElementById('summaryBody').rows].map(r => ({name: r.cells[0].innerText, won: parseInt(r.cells[1].innerText.replace('₹',''))})).sort((a,b)=>b.won-a.won);
        rows.slice(0,3).forEach((r, i) => text += `${i+1}. ${r.name} - ₹${r.won}\n`);
        text += `\n🌐 *Portal:* https://neerajjaggi02.github.io/ipl-family-league-20226/`;
        navigator.clipboard.writeText(text).then(() => alert("Report copied!"));
    }

    window.onload = () => {
        ['p1', 'p2', 'p3', 'p4', 'p5'].forEach(id => {
            document.getElementById(id).innerHTML = ALL_PLAYERS.map(p => `<option value="${p}">${p}</option>`).join('');
        });
        db.ref('leagueMaster').on('value', snap => {
            paidHistory = snap.val()?.paidHistory || [];
            db.ref('leagueRecords').on('value', snap => {
                winnersList = snap.val() || {};
                renderAll();
                document.getElementById('cloudStatus').innerText = "LIVE ✅";
            });
        });
    };
</script>
</body>
</html>
