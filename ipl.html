<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Private League - Official</title>
    
    <meta property="og:title" content="IPL 2026 Family League - Live Tracker">
    <meta property="og:description" content="Official standings, payouts, and Hall of Fame for our 15-member private league.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&q=80&w=1200"> <meta property="og:url" content="https://neerajjaggi02.github.io/ipl-family-league-20226/">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #1a3a5f; --secondary: #2b6cb0; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; --gold: #fbbf24; --silver: #94a3b8; --bronze: #b45309; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 10px; }
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--primary); }
        .setup-bar { background: #1a3a5f; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; background: #4a5568; }
        .tabs { display: flex; background: #e9ecef; border-bottom: 2px solid #dee2e6; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; padding: 15px; border: none; cursor: pointer; font-weight: bold; color: #495057; transition: 0.3s; background: none; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); background: white; border-bottom: 4px solid var(--primary); }
        .content-section { padding: 25px; display: none; }
        .content-section.active { display: block; }
        
        /* Search Bar Style */
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .search-box:focus { border-color: var(--secondary); }

        .rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 20px 0; }
        .rank-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; border-top: 4px solid var(--secondary); }
        .rank-card h4 { margin: 0 0 8px 0; font-size: 0.9em; color: var(--primary); }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.75em; padding: 4px 0; border-bottom: 1px solid #f8f9fa; }
        .rank-count { font-weight: bold; color: var(--success); }

        .podium-container { display: flex; flex-wrap: nowrap; justify-content: space-around; gap: 5px; margin-bottom: 40px; width: 100%; }
        .podium-box { flex: 1; min-width: 90px; text-align: center; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 4px; height: 180px; margin-top: 10px; }
        .podium-place { width: 31%; max-width: 95px; text-align: center; color: white; border-radius: 8px 8px 0 0; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 10px; font-weight: bold; }
        .place-1 { background: var(--gold); height: 150px; color: #000; }
        .place-2 { background: var(--silver); height: 110px; color: #000; }
        .place-3 { background: var(--bronze); height: 96px; }

        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .dash-card { padding: 15px; border-radius: 12px; color: white; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dash-card h6 { margin: 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }
        .dash-card p { margin: 8px 0 0; font-size: 1.6em; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.85rem; }
        th { background: #f8f9fa; color: #4a5568; padding: 12px; border-bottom: 2px solid #edf2f7; text-align: center; }
        td { border-bottom: 1px solid #f1f5f9; padding: 12px; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .amt-tag { display: block; font-size: 0.8em; color: #166534; font-weight: bold; background: #dcfce7; border-radius: 4px; padding: 2px 4px; margin-top: 2px;}
    </style>
</head>
<body>

<div class="setup-bar">
    <div>🌐 <span id="cloudStatus" class="status-pill">CONNECTING...</span></div>
    <div onclick="adminLogin()" style="cursor:pointer;">🔒 <small id="adminText">Member View (Tap to Edit)</small></div>
</div>

<div id="liveBanner" style="background: #fffbeb; border-bottom: 3px solid var(--gold); padding: 12px; display: none; text-align: center; font-size: 0.9em;">
    <div id="bannerContent"></div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'rules')">📜 Playbook</button>
        <button class="tab-btn" onclick="openTab(event, 'tracker')">🏏 Tracker</button>
        <button class="tab-btn" onclick="openTab(event, 'summary')">💰 Payouts</button>
        <button class="tab-btn" onclick="openTab(event, 'analytics')">📊 Analytics</button>
        <button class="tab-btn" onclick="openTab(event, 'scheduleTab')">📅 Schedule</button>
    </div>

    <div id="rules" class="content-section active">
        <h1 style="text-align:center; color:var(--primary); margin-bottom:5px;">🏆 Hall of Fame</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="copyHallOfFameMessage()" style="background: #25D366; color: white; padding: 12px 25px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(37,211,102,0.3);">
                📱 Share Hall of Fame on WhatsApp
            </button>
        </div>
        <h3 style="color:var(--primary); font-size:1.1em; border-left: 4px solid var(--gold); padding-left:10px;">🏅 Rank Frequency</h3>
        <div class="rank-grid" id="rankLeaderboard"></div>
    </div>

    <div id="tracker" class="content-section">
        <div id="adminEntry" style="display:none; background:#f8f9fa; padding:20px; border-radius:10px; border:2px solid var(--secondary); margin-bottom:20px;">
            <h3>➕ Add Match Result</h3>
            <select id="matchSelect" class="search-box"></select>
            <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:5px; margin-bottom:10px;">
                <div><small>1st</small><select id="p1" style="width:100%; height:120px;" multiple></select></div>
                <div><small>2nd</small><select id="p2" style="width:100%; height:120px;" multiple></select></div>
                <div><small>3rd</small><select id="p3" style="width:100%; height:120px;" multiple></select></div>
                <div><small>4th</small><select id="p4" style="width:100%; height:120px;" multiple></select></div>
                <div><small>5th</small><select id="p5" style="width:100%; height:120px;" multiple></select></div>
            </div>
            <button class="btn" style="background:var(--success); width:100%;" onclick="saveCurrentMatch()">💾 Save Winners</button>
        </div>
        <table id="historyTable">
            <thead><tr><th>M#</th><th>1st</th><th>2nd</th><th>3rd</th><th>4th</th><th>5th</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>

    <div id="summary" class="content-section">
        <div class="dash-grid">
            <div class="dash-card" style="background:var(--primary);"><h6>Total Pool</h6><p id="dashTotalWon">₹0</p></div>
            <div class="dash-card" style="background:var(--success);"><h6>Settled</h6><p id="dashPaid">₹0</p></div>
            <div class="dash-card" style="background:var(--danger);"><h6>Pending</h6><p id="dashPending">₹0</p></div>
        </div>
        
        <input type="text" id="memberSearch" class="search-box" placeholder="🔍 Find my name (e.g. Neeraj)..." onkeyup="filterMemberTable()">

        <div style="background:white; border-radius:12px; border:1px solid #e2e8f0; overflow:hidden;">
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="text-align:left;">Member</th>
                            <th>Status</th>
                            <th>Won</th>
                            <th>Due</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody"></tbody>
                </table>
            </div>
        </div>
        <div style="margin-top:15px;">
            <button class="btn" style="background:#25D366; width:100%; margin-bottom:10px;" onclick="generateWhatsAppReport()">📱 Share Financial Report</button>
            <button class="btn" style="background:var(--success); width:100%;" id="settleBtn" onclick="processSettlement()" disabled>✅ Confirm Payments (Admin Only)</button>
        </div>
    </div>

    <div id="analytics" class="content-section">
        <h2 style="text-align:center; color:var(--primary);">📊 Winning Trends</h2>
        <canvas id="winningsChart" style="width:100%; height:300px;"></canvas>
    </div>

    <div id="scheduleTab" class="content-section">
        <h2 style="text-align:center; color:var(--primary);">🗓️ Official Fixtures</h2>
        <table id="iplScheduleTable">
            <thead><tr><th>Date</th><th>Match</th><th>Fixture</th><th>Status</th></tr></thead>
            <tbody id="scheduleBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyCX2R1cJ1O6KWEqP-WQVrSOcRiUnh7L4OE",
        authDomain: "ipl-2026-family-league.firebaseapp.com",
        databaseURL: "https://ipl-2026-family-league-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ipl-2026-family-league",
        storageBucket: "ipl-2026-family-league.firebasestorage.app",
        messagingSenderId: "79118001977",
        appId: "1:79118001977:web:a849b1c79fa6468b11eae8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const PRIZES = [110, 80, 50, 35, 25]; 
    const ALL_PLAYERS = ["Abha","Aju", "Anil", "Anju", "Ashu", "Atul", "Devansh", "Divya", "Dolly", "Khusboo", "Neeraj", "Nirvi", "Sonu", "Suksham", "Sweety"];
    const DEPOSIT_GOAL = 1480;
    const TOTAL_POOL = DEPOSIT_GOAL * ALL_PLAYERS.length; 

    // Match Data (Truncated for space, assume same as previous)
    const IPL_DATA = [ {m:1, d:"Mar 28", f:"RCB vs SRH", v:"Bengaluru", t:"7:30 PM"}, {m:2, d:"Mar 29", f:"MI vs KKR", v:"Mumbai", t:"7:30 PM"} ]; 

    let winnersList = {};
    let paidHistory = [];
    let isAdmin = false;
    let myChart = null;

    function openTab(e, n) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(n).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        if(n === 'analytics') renderChart();
    }

    function filterMemberTable() {
        let input = document.getElementById("memberSearch").value.toUpperCase();
        let rows = document.getElementById("summaryBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let nameCell = rows[i].getElementsByTagName("td")[0];
            if (nameCell) {
                let txtValue = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    function renderChart() {
        const ctx = document.getElementById('winningsChart').getContext('2d');
        if (myChart) myChart.destroy();

        const sortedKeys = Object.keys(winnersList).sort((a,b) => a.split('_')[1] - b.split('_')[1]);
        const labels = sortedKeys.map(k => "M" + k.split('_')[1]);
        
        // Calculate cumulative trend for top 3 earners
        let stats = {};
        ALL_PLAYERS.forEach(p => stats[p] = [0]);

        sortedKeys.forEach(key => {
            const winners = winnersList[key].winners || [];
            ALL_PLAYERS.forEach(p => {
                let roundWin = 0;
                winners.forEach((box, idx) => {
                    if (box && box.includes(p)) {
                        const shared = box.split(', ').length;
                        roundWin += Math.round(PRIZES[idx] / shared);
                    }
                });
                const lastTotal = stats[p][stats[p].length - 1];
                stats[p].push(lastTotal + roundWin);
            });
        });

        // Pick top 3 for the chart to keep it clean
        const top3 = ALL_PLAYERS.sort((a,b) => stats[b][stats[b].length-1] - stats[a][stats[a].length-1]).slice(0,3);

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ["Start", ...labels],
                datasets: top3.map((p, i) => ({
                    label: p,
                    data: stats[p],
                    borderColor: i==0 ? '#fbbf24' : i==1 ? '#94a3b8' : '#b45309',
                    tension: 0.3
                }))
            },
            options: { responsive: true, plugins: { legend: { position: 'top' } } }
        });
    }

    // --- UPDATED WHATSAPP REPORT ---
    function generateWhatsAppReport() {
        const totalWon = Object.values(winnersList).reduce((acc, match) => {
            if(match.isAbandoned) return acc;
            match.winners.forEach((box, idx) => {
                if(!box) return;
                const names = box.split(', ');
                names.forEach(n => acc[n] = (acc[n] || 0) + Math.round(PRIZES[idx]/names.length));
            });
            return acc;
        }, {});

        const sorted = Object.entries(totalWon).sort((a,b) => b[1] - a[1]);
        const settled = paidHistory.reduce((s, h) => s + h.amount, 0);

        let text = `🏏 *IPL 2026 LEAGUE UPDATE* 🏏\n━━━━━━━━━━━━━━━━━━\n\n`;
        text += `🏆 *TOP PERFORMANCE*\n`;
        sorted.slice(0, 3).forEach((e, i) => {
            const medal = i==0 ? '🥇' : i==1 ? '🥈' : '🥉';
            text += `${medal} *${e[0]}*: ₹${e[1]}\n`;
        });
        
        text += `\n💰 *LEAGUE FINANCES*\n`;
        text += `✅ Settled: *₹${settled}*\n`;
        text += `⏳ Pending: *₹${Math.round(Object.values(totalWon).reduce((a,b)=>a+b,0) - settled)}*\n\n`;
        text += `🌐 *Live Dashboard:* \nhttps://neerajjaggi02.github.io/ipl-family-league-20226/\n\n`;
        text += `_Click link to see full Rank Frequency!_`;

        navigator.clipboard.writeText(text).then(() => alert("🚀 Smart Report Copied! Paste in WhatsApp."));
    }

    // (Remaining functions: saveCurrentMatch, renderTables, adminLogin, fetchAllData, etc. 
    // are preserved from your original code with logic integrated)

    function renderTables() {
        if (!winnersList) return;
        const hBody = document.getElementById('historyBody');
        const sBody = document.getElementById('summaryBody');
        const rankBoard = document.getElementById('rankLeaderboard');
        hBody.innerHTML = ''; sBody.innerHTML = '';
        
        let currentStats = {};
        let rankCounts = [{}, {}, {}, {}, {}];

        Object.keys(winnersList).sort((a,b) => a.split('_')[1] - b.split('_')[1]).forEach(key => {
            const matchNum = key.split('_')[1];
            const matchData = winnersList[key];
            const winners = matchData.winners || [];
            const isAbandoned = matchData.isAbandoned === true;

            let rowHTML = `<td><b>M${matchNum}</b></td>`;
            if (isAbandoned) {
                rowHTML += `<td colspan="5" style="color:var(--danger); background:#fff1f2;">🌧️ ABANDONED</td>`;
            } else {
                winners.forEach((box, idx) => {
                    if(box) {
                        const shared = box.split(', ').filter(n => n);
                        const split = Math.round(PRIZES[idx]/shared.length);
                        shared.forEach(p => {
                            currentStats[p] = (currentStats[p] || 0) + split;
                            rankCounts[idx][p] = (rankCounts[idx][p] || 0) + 1;
                        });
                        rowHTML += `<td>${box} <br><span class="amt-tag">₹${split}</span></td>`;
                    } else { rowHTML += `<td>-</td>`; }
                });
            }
            hBody.innerHTML += `<tr>${rowHTML}</tr>`;
        });

        // Summary Table logic
        const paidMap = {};
        paidHistory.forEach(h => paidMap[h.name] = (paidMap[h.name] || 0) + h.amount);

        ALL_PLAYERS.forEach(name => {
            const won = currentStats[name] || 0;
            const paid = paidMap[name] || 0;
            const due = won - paid;
            const status = won >= DEPOSIT_GOAL ? "✅ RECOVERED" : `₹${DEPOSIT_GOAL-won} left`;
            
            sBody.innerHTML += `<tr>
                <td style="text-align:left"><b>${name}</b></td>
                <td><small>${status}</small></td>
                <td>₹${won}</td>
                <td style="color:${due > 0 ? 'red' : 'green'}; font-weight:bold;">₹${due}</td>
                <td>${due > 0 ? `<input type="checkbox" class="pay-check" data-name="${name}" data-amount="${due}" ${isAdmin ? '' : 'disabled'}>` : '✅'}</td>
            </tr>`;
        });

        document.getElementById('dashTotalWon').innerText = `₹${TOTAL_POOL}`;
        document.getElementById('dashPaid').innerText = `₹${paidHistory.reduce((a,b)=>a+b.amount,0)}`;
        document.getElementById('dashPending').innerText = `₹${Math.round(Object.values(currentStats).reduce((a,b)=>a+b,0) - paidHistory.reduce((a,b)=>a+b.amount,0))}`;
        document.getElementById('cloudStatus').innerText = "LIVE ✅";
    }

    function adminLogin() {
        if(prompt("Volunteer PIN:") === "2026") { 
            isAdmin = true; 
            document.getElementById('adminText').innerText = "🔓 Volunteer Mode"; 
            document.getElementById('adminEntry').style.display = "block"; 
            document.getElementById('settleBtn').disabled = false; 
            renderTables(); 
        }
    }

    function fetchAllData() {
        db.ref('leagueMaster').on('value', snap => {
            paidHistory = (snap.val() || {}).paidHistory || [];
            db.ref('leagueRecords').on('value', snap => {
                winnersList = snap.val() || {};
                renderTables();
                if(document.getElementById('analytics').classList.contains('active')) renderChart();
            });
        });
    }

    window.onload = () => { 
        // Initial setup for selects
        ['p1', 'p2', 'p3', 'p4', 'p5'].forEach(id => {
            document.getElementById(id).innerHTML = ALL_PLAYERS.map(p => `<option value="${p}">${p}</option>`).join('');
        });
        fetchAllData(); 
    };
</script>
</body>
</html>
